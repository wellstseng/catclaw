packages:
  - "."
  - "mcp/computer-use"
  - "mcp/playwright"

onlyBuiltDependencies:
  - protobufjs
  - sharp

# @google/genai 是 registry 預建包（dist 已內含），preinstall/prepare 皆 no-op、無需執行。
# 明確列為 ignored：通過公司全域 strictDepBuilds 檢查，不再 exit 1。
ignoredBuiltDependencies:
  - "@google/genai"

# 公司全域 pnpm 啟用 strictDepBuilds（未核准 build script 即 exit 1）。
# 本專案 build script 已逐一審視，降為非致命避免 catclaw 啟動被擋。
strictDepBuilds: false
